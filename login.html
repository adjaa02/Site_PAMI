<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — PAMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-black text-white font-['Space_Grotesk'] min-h-screen overflow-x-hidden">

    <!-- Background elements (identiques à home.html) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="absolute top-20 left-10 w-96 h-96 bg-indigo-900/10 rounded-full blur-3xl"></div>
      <div class="absolute bottom-10 right-10 w-80 h-80 bg-purple-900/10 rounded-full blur-3xl"></div>
      <div class="absolute top-40 right-20 w-64 h-64 bg-cyan-900/10 rounded-full blur-3xl"></div>
      <div class="absolute inset-0 grid grid-cols-12 opacity-5 pointer-events-none">
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
      </div>
      <div class="absolute inset-0 grid grid-rows-12 opacity-5 pointer-events-none">
        <div class="border-b border-cyan-500"></div><div class="border-b border-cyan-500"></div>
        <div class="border-b border-cyan-500"></div><div class="border-b border-cyan-500"></div>
        <div class="border-b border-cyan-500"></div><div class="border-b border-cyan-500"></div>
        <div class="border-b border-cyan-500"></div><div class="border-b border-cyan-500"></div>
        <div class="border-b border-cyan-500"></div><div class="border-b border-cyan-500"></div>
        <div class="border-b border-cyan-500"></div><div class="border-b border-cyan-500"></div>
      </div>
    </div>

    <!-- Navigation Bar (identique à home.html) -->
    <nav class="fixed top-0 left-0 right-0 bg-gray-900/70 backdrop-blur-lg border-b border-cyan-500/30 z-50">
      <div class="container mx-auto px-6 py-3">
        <div class="flex items-center justify-between">
          <a href="home.html" class="flex items-center">
            <div class="relative mr-2">
              <div class="absolute inset-0 bg-cyan-400/30 rounded-md blur-sm"></div>
              <div class="w-10 h-10 rounded-md bg-gradient-to-br from-indigo-600 to-purple-600 border border-indigo-400/30 flex items-center justify-center relative shadow-lg shadow-indigo-800/20">
                <div class="absolute inset-[3px] bg-gray-900 rounded-[4px] flex items-center justify-center overflow-hidden">
                  <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/20 to-purple-900/20"></div>
                  <div class="font-bold text-lg bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">PAMI</div>
                </div>
              </div>
            </div>
            <div class="text-xl font-medium bg-gradient-to-r from-indigo-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent">
              Nom Du Site
            </div>
          </a>
          <a href="home.html" class="text-gray-400 hover:text-cyan-400 text-sm transition-colors duration-200 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Retour à l'accueil
          </a>
        </div>
      </div>
    </nav>

    <!-- Contenu principal -->
    <main class="min-h-screen flex items-center justify-center relative pt-20 px-6">
      <div class="w-full max-w-md">

        <!-- En-tête -->
        <div class="text-center mb-8">
          <div class="text-xs text-cyan-400 tracking-widest uppercase mb-2">Espace personnel</div>
          <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent mb-3">
            Connexion
          </h1>
          <div class="w-16 h-1 bg-gradient-to-r from-cyan-500 to-indigo-500 mx-auto"></div>
        </div>

        <!-- Carte de connexion -->
        <div class="relative group">
          <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-600/30 to-purple-600/30 rounded-xl blur opacity-75"></div>
          <div class="relative bg-gray-900/70 backdrop-blur-lg border border-indigo-500/20 p-8 rounded-xl shadow-xl">

            <!-- Message d'erreur (caché par défaut) -->
            <div id="error-msg" class="hidden mb-5 px-4 py-3 bg-red-900/30 border border-red-500/40 rounded-lg text-red-400 text-sm flex items-center gap-2">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              </svg>
              <span id="error-text">Identifiant ou mot de passe incorrect.</span>
            </div>

            <!-- Message de succès (caché par défaut) -->
            <div id="success-msg" class="hidden mb-5 px-4 py-3 bg-emerald-900/30 border border-emerald-500/40 rounded-lg text-emerald-400 text-sm flex items-center gap-2">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              <span>Connexion réussie ! Redirection en cours...</span>
            </div>

            <!-- Formulaire -->
            <div id="login-form">

              <!-- Champ identifiant -->
              <div class="mb-5">
                <label for="username" class="block text-sm text-gray-400 mb-1">Identifiant</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                  </div>
                  <input
                    type="text"
                    id="username"
                    placeholder="Votre identifiant"
                    class="w-full bg-gray-800/50 border border-gray-700 focus:border-cyan-500 rounded-lg py-2.5 pl-10 pr-3 text-white placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-colors"
                  >
                </div>
              </div>

              <!-- Champ mot de passe -->
              <div class="mb-6">
                <div class="flex justify-between items-center mb-1">
                  <label for="password" class="block text-sm text-gray-400">Mot de passe</label>
                  <a href="#" class="text-xs text-cyan-400/70 hover:text-cyan-400 transition-colors">Mot de passe oublié ?</a>
                </div>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                  </div>
                  <input
                    type="password"
                    id="password"
                    placeholder="Votre mot de passe"
                    class="w-full bg-gray-800/50 border border-gray-700 focus:border-cyan-500 rounded-lg py-2.5 pl-10 pr-10 text-white placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-colors"
                  >
                  <!-- Bouton afficher/masquer -->
                  <button
                    type="button"
                    id="toggle-password"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-cyan-400 transition-colors"
                  >
                    <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <!-- Bouton connexion -->
              <div class="relative group/btn">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-600/50 to-purple-600/50 rounded-lg blur opacity-75 group-hover/btn:opacity-100 transition-all duration-500"></div>
                <button
                  id="login-btn"
                  onclick="handleLogin()"
                  class="w-full px-6 py-3 bg-gradient-to-r from-indigo-900/90 to-purple-900/90 rounded-lg text-white text-base font-medium relative z-10 flex items-center justify-center gap-2 group-hover/btn:from-indigo-800/90 group-hover/btn:to-purple-800/90 transition-all duration-300"
                >
                  <span class="bg-gradient-to-r from-cyan-300 to-indigo-300 bg-clip-text text-transparent">Se connecter</span>
                </button>
              </div>

            </div><!-- fin #login-form -->

          </div>
        </div>
        <!-- Fin carte -->

        <!-- Lien retour -->
        <p class="text-center text-gray-600 text-sm mt-6">
          Pas encore de compte ?
          <a href="#" class="text-cyan-400/70 hover:text-cyan-400 transition-colors ml-1">Contactez l'équipe PAMI</a>
        </p>

      </div>
    </main>

    <!-- Footer (identique à home.html) -->
    <footer class="bg-gray-900/80 backdrop-blur-lg border-t border-gray-800 mt-10">
      <div class="container mx-auto px-6 py-8">
        <div class="text-center text-gray-500 text-sm">
          © 2025 PAMI. Tous droits réservés.
        </div>
      </div>
    </footer>

  </div><!-- fin .bg-black wrapper -->

  <script>
    // ── Identifiants autorisés (à modifier selon vos besoins) ──────────────────
    const UTILISATEURS = [
      { identifiant: "admin",  motDePasse: "pami2026" },
      { identifiant: "nawel",  motDePasse: "nawel123" },
      { identifiant: "adja",   motDePasse: "adja123"  },
    ];

    // ── Afficher / masquer le mot de passe ─────────────────────────────────────
    document.getElementById("toggle-password").addEventListener("click", function () {
      const input = document.getElementById("password");
      const icon  = document.getElementById("eye-icon");
      if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
               a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
               M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
               m7.532 7.532l3.29 3.29M3 3l3.59 3.59
               m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7
               a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      } else {
        input.type = "password";
        icon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
               9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    });

    // ── Connexion avec Enter ───────────────────────────────────────────────────
    document.getElementById("password").addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleLogin();
    });
    document.getElementById("username").addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleLogin();
    });

    // ── Logique de vérification ────────────────────────────────────────────────
    function handleLogin() {
      const identifiant = document.getElementById("username").value.trim();
      const motDePasse  = document.getElementById("password").value;
      const errorMsg    = document.getElementById("error-msg");
      const errorText   = document.getElementById("error-text");
      const successMsg  = document.getElementById("success-msg");
      const btn         = document.getElementById("login-btn");

      // Réinitialiser les messages
      errorMsg.classList.add("hidden");
      successMsg.classList.add("hidden");

      // Vérification champs vides
      if (!identifiant || !motDePasse) {
        errorText.textContent = "Veuillez remplir tous les champs.";
        errorMsg.classList.remove("hidden");
        return;
      }

      // Vérification identifiants
      const utilisateur = UTILISATEURS.find(
        u => u.identifiant === identifiant && u.motDePasse === motDePasse
      );

      if (utilisateur) {
        // Succès
        successMsg.classList.remove("hidden");
        btn.disabled = true;
        btn.classList.add("opacity-60", "cursor-not-allowed");
        // Redirection vers la page d'accueil après 1,5 secondes
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1500);
      } else {
        // Échec
        errorText.textContent = "Identifiant ou mot de passe incorrect.";
        errorMsg.classList.remove("hidden");
        // Secouer le formulaire
        const form = document.getElementById("login-form");
        form.classList.add("animate-shake");
        setTimeout(() => form.classList.remove("animate-shake"), 500);
      }
    }
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }
  </style>

</body>
</html>
