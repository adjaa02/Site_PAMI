<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — PAMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

  <div class="bg-black text-white font-['Space_Grotesk'] min-h-screen overflow-x-hidden">

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="absolute top-20 left-10 w-96 h-96 bg-indigo-900/25 rounded-full blur-3xl"></div>
      <div class="absolute bottom-10 right-10 w-80 h-80 bg-purple-900/25 rounded-full blur-3xl"></div>
      <div class="absolute inset-0 grid grid-cols-12 opacity-10 pointer-events-none">
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
        <div class="border-r border-cyan-500"></div><div class="border-r border-cyan-500"></div>
      </div>
    </div>

    <nav class="fixed top-0 left-0 right-0 bg-gray-900/70 backdrop-blur-lg border-b border-cyan-500/30 z-50">
        <div class="container mx-auto px-6 py-3">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="group flex items-center gap-3">
                  <div class="relative">
                    <div class="absolute inset-0 bg-cyan-400/20 rounded-lg blur-md group-hover:bg-cyan-400/40 transition-all"></div>
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 border border-white/10 flex items-center justify-center relative overflow-hidden shadow-2xl">
                      <span class="font-black text-xl text-white tracking-tighter"><img src="images/logo.png"></span>
                      <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent"></div>
                    </div>
                  </div>
                  
                  <div class="flex flex-col">
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white via-cyan-200 to-indigo-300 bg-clip-text text-transparent">
                      PAMI
                    </span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-cyan-500/80 font-bold leading-none">
                      Intelligence
                    </span>
                  </div>
                </a>
              </div>
            <a href="index.html" class="text-gray-400 hover:text-cyan-400 text-sm transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
              Retour à l'accueil
            </a>
          </div>
        </div>
      </nav>
  

    <main class="min-h-screen flex items-center justify-center relative pt-20 px-6">

      <div class="absolute inset-y-0 left-0 flex items-center pl-4 md:pl-16 pointer-events-none z-0" aria-hidden="true">
        <svg class="robot-visible left-robot" viewBox="0 0 420 480">
          <use href="#robot-template" />
          <style>
            .left-robot .arm-wave { animation: wave 2s ease-in-out infinite; transform-origin: 135px 230px; }
            @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-45deg); } }
          </style>
        </svg>
      </div>

      <div class="w-full max-w-lg relative z-10">
        <div class="text-center mb-6">
          <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent mb-2">Rejoignez-nous</h1>
          <p class="text-gray-400 text-sm">Commencez votre aventure avec PAMI</p>
        </div>

        <div class="bg-gray-900/60 backdrop-blur-xl border border-white/10 p-8 rounded-[2rem] shadow-2xl">
          <div id="success-message" class="hidden mb-6 p-4 bg-emerald-500/20 border border-emerald-500/50 rounded-xl text-emerald-400 text-center text-sm animate-pulse">
            Compte créé avec succès ! Redirection en cours...
          </div>

          <form id="register-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs text-gray-400 mb-1 ml-1">Prénom</label>
                  <input type="text" required placeholder="Jean" class="w-full bg-white/5 border border-white/10 focus:border-cyan-500 rounded-xl py-3 px-4 text-white outline-none transition-all">
                </div>
                <div>
                  <label class="block text-xs text-gray-400 mb-1 ml-1">Nom</label>
                  <input type="text" required placeholder="Dupont" class="w-full bg-white/5 border border-white/10 focus:border-cyan-500 rounded-xl py-3 px-4 text-white outline-none transition-all">
                </div>
            </div>

            <div>
              <label class="block text-xs text-gray-400 mb-1 ml-1">Adresse Email</label>
              <input type="email" required placeholder="nom@exemple.com" class="w-full bg-white/5 border border-white/10 focus:border-cyan-500 rounded-xl py-3 px-4 text-white outline-none transition-all">
            </div>

            <div>
              <label class="block text-xs text-gray-400 mb-1 ml-1">Mot de passe</label>
              <input type="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 focus:border-cyan-500 rounded-xl py-3 px-4 text-white outline-none transition-all">
            </div>

            <div class="pt-4">
              <button type="submit" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-indigo-600 rounded-xl text-white font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-cyan-500/25">
                Créer mon compte
              </button>
            </div>
          </form>

          <div class="mt-6 text-center">
            <p class="text-gray-500 text-sm">Déjà un compte ? 
              <a href="login.html" class="text-cyan-400 hover:underline font-medium">Se connecter</a>
            </p>
          </div>
        </div>
      </div>

      <div class="absolute inset-y-0 right-0 flex items-center pr-4 md:pr-16 pointer-events-none z-0" aria-hidden="true">
        <svg class="robot-visible right-robot" viewBox="0 0 420 480">
          <use href="#robot-template" />
        </svg>
      </div>

    </main>

    <svg style="display: none;">
      <symbol id="robot-template" viewBox="0 0 420 480">
        <defs>
          <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#475569" />
            <stop offset="100%" stop-color="#1e293b" />
          </linearGradient>
        </defs>
        <g class="robot-float">
          <line x1="210" y1="72" x2="210" y2="102" stroke="#22D3EE" stroke-width="3" />
          <circle cx="210" cy="65" r="8" fill="#22D3EE" />
          <rect x="158" y="102" width="104" height="84" rx="20" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2"/>
          <circle cx="192" cy="142" r="10" fill="#22D3EE" />
          <circle cx="228" cy="142" r="10" fill="#22D3EE" />
          <rect x="138" y="201" width="144" height="118" rx="25" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2"/>
          <rect x="163" y="218" width="94" height="52" rx="10" fill="#0f172a" />
          <rect class="arm-wave" x="95" y="210" width="35" height="80" rx="15" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2" />
          <rect x="290" y="210" width="35" height="80" rx="15" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2" />
          <rect x="165" y="325" width="35" height="60" rx="15" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2" />
          <rect x="220" y="325" width="35" height="60" rx="15" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2" />
        </g>
      </symbol>
    </svg>

    <style>
      .robot-visible { width: min(350px, 40vw); height: auto; filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.3)); }
      .robot-float { animation: float 6s ease-in-out infinite; }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
      .left-robot { transform: scaleX(-1); }
    </style>

    <script>
      // Gestion de la redirection après inscription
      document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault(); // Empêche l'envoi réel du formulaire pour la démo
        
        const successMsg = document.getElementById('success-message');
        const form = document.getElementById('register-form');
        
        // Afficher le message de succès
        successMsg.classList.remove('hidden');
        form.classList.add('opacity-50', 'pointer-events-none');
        
        // Redirection vers la page d'accueil (home.html) après 2 secondes
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      });
    </script>
  </div>
</body>
</html>
